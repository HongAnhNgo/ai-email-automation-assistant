<div style="margin:0;padding:0;background-color:#FFF7F1;font-family:'Nunito',Arial,sans-serif;">
  <table cellpadding="0" cellspacing="0" border="0" style="background-color:#FFF7F1;padding:40px 0;">
    <tbody><tr>
      <td>

        
        <table cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:24px;padding:40px;
          box-shadow:0 8px 24px rgba(0,0,0,0.06);">

          
          <tbody><tr>
            <td style="padding-bottom:24px;">
              <img src="https://cherrumistationarysto.blob.core.windows.net/cherummiassets/CherrumiStationarylogo.png" alt="Cherrumi" style="display:block;border:0;max-width:220px;height:auto;">
            </td>
          </tr>

          
          <tr>
            <td>
              <div style="height:4px;
                width:100%;
                background:linear-gradient(90deg,#FF7FA8,#FFC7B5,#CDB7FF);
                border-radius:999px;
                margin-bottom:32px;"></div>
            </td>
          </tr>

          
          <tr>
            <td style="color:#444444;
              font-size:16px;
              line-height:1.8;">

              @{concat(
  '<p>',
  join(
    split(body('Parse_JSON')?['professional_reply'], decodeUriComponent('%0A')),
    '</p><p>'
  ),
  '</p>'
)}

            </td>
          </tr>

          
          <tr>
            <td style="padding-top:40px;">

              <div style="background:#FFF7F1;
                border-radius:18px;
                padding:20px;">

                <div style="color:#E85A70;
                  font-size:18px;
                  font-weight:700;
                  margin-bottom:8px;">
                  ✨ Thank you for choosing Cherrumi ✨
                </div>

                <div style="color:#777777;
                  font-size:14px;
                  line-height:1.6;">
                  Cute stationery made with care for your everyday creativity 💌
                </div>

              </div>

            </td>
          </tr>

        </tbody></table>

      </td>
    </tr>
  </tbody></table>
</div>
